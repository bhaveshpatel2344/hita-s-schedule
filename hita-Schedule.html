<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Hita's Schedule Pro</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f8f9fa;
  --white: #ffffff;
  --ink: #1a1714;
  --ink2: #5f6368;
  --border: #e8eaed;
  --j1: #c94040;
  --j1-soft: #fef2f2;
  --j2: #2a6dd9;
  --j2-soft: #eff6ff;
  --accent: #6200ee;
  --radius: 12px;
  --shadow: 0 2px 10px rgba(0,0,0,0.05);
}

* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body { 
    background: var(--bg); 
    color: var(--ink); 
    font-family: 'DM Sans', sans-serif; 
    margin: 0; 
    padding-bottom: 100px;
}

/* Header */
.header { background: var(--white); padding: 20px; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 10; }
.header-top { display: flex; justify-content: space-between; align-items: center; }
.logo { font-family: 'Playfair Display', serif; font-size: 24px; font-weight: 900; }
.logo span { color: var(--j1); }

/* Config Section */
.controls { padding: 15px 20px; background: var(--white); display: flex; gap: 10px; overflow-x: auto; border-bottom: 1px solid var(--border); }
.input-group { min-width: 140px; }
.input-group label { font-size: 10px; text-transform: uppercase; font-weight: 700; color: var(--ink2); display: block; margin-bottom: 4px; }
input[type="date"], input[type="text"] { 
    width: 100%; border: 1px solid var(--border); padding: 8px; border-radius: 8px; font-family: inherit;
}

/* Schedule Grid */
.day-card { 
    background: var(--white); margin: 10px 15px; border-radius: var(--radius); 
    box-shadow: var(--shadow); display: grid; grid-template-columns: 60px 1fr 1fr; overflow: hidden;
}
.day-info { 
    display: flex; flex-direction: column; align-items: center; justify-content: center; 
    background: #f1f3f4; border-right: 1px solid var(--border);
}
.dow { font-size: 11px; font-weight: 700; color: var(--ink2); }
.dom { font-size: 18px; font-weight: 700; }

.shift-slot { padding: 12px; cursor: pointer; min-height: 70px; display: flex; flex-direction: column; justify-content: center; }
.shift-slot.empty { color: #bdc1c6; font-size: 12px; text-align: center; border-right: 1px solid var(--border); }
.shift-slot.filled { border-right: 1px solid var(--border); }
.j1-bg { background: var(--j1-soft); border-left: 4px solid var(--j1); }
.j2-bg { background: var(--j2-soft); border-left: 4px solid var(--j2); }

.s-name { font-weight: 700; font-size: 13px; margin-bottom: 2px; }
.s-time { font-size: 11px; color: var(--ink2); }

/* Bottom Sheet */
.modal-overlay { 
    position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: none; 
    align-items: flex-end; z-index: 100; backdrop-filter: blur(4px);
}
.modal-overlay.active { display: flex; }
.sheet { 
    background: var(--white); width: 100%; border-radius: 20px 20px 0 0; 
    padding: 25px; transform: translateY(100%); transition: transform 0.3s ease; 
}
.modal-overlay.active .sheet { transform: translateY(0); }

.quick-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
.action-btn { 
    padding: 12px; border: 1px solid var(--border); border-radius: 10px; 
    background: #f8f9fa; cursor: pointer; font-weight: 600; font-size: 13px;
}
.action-btn:hover { background: #eee; }

.custom-form { display: grid; gap: 15px; }
.time-inputs { display: flex; gap: 10px; }
.save-btn { 
    background: var(--ink); color: white; padding: 15px; border: none; 
    border-radius: 10px; font-weight: 700; cursor: pointer; margin-top: 10px;
}
.clear-btn { background: transparent; color: #d93025; border: none; padding: 10px; cursor: pointer; font-size: 13px; }

.export-fab {
    position: fixed; bottom: 20px; right: 20px; background: var(--ink); color: white;
    padding: 15px 25px; border-radius: 30px; font-weight: 700; box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    border: none; cursor: pointer; z-index: 5;
}
</style>
</head>
<body>

<div class="header">
    <div class="header-top">
        <div class="logo">Hita<span>'s</span></div>
        <div id="statCounter" style="font-size: 12px; font-weight: 600; color: var(--ink2);">0 Shifts This Month</div>
    </div>
</div>

<div class="controls">
    <div class="input-group">
        <label>Start Date</label>
        <input type="date" id="startDate" onchange="renderSchedule()">
    </div>
    <div class="input-group">
        <label>Job 1 Name</label>
        <input type="text" id="j1Name" value="On-Site" oninput="renderSchedule()">
    </div>
    <div class="input-group">
        <label>Job 2 Name</label>
        <input type="text" id="j2Name" value="Remote" oninput="renderSchedule()">
    </div>
</div>

<div id="scheduleGrid"></div>

<button class="export-fab" onclick="exportICS()">Export to iOS</button>

<div class="modal-overlay" id="modal">
    <div class="sheet">
        <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h3 id="modalTitle">Edit Shift</h3>
            <button onclick="closeModal()" style="border:none; background:none; font-size: 20px;">✕</button>
        </div>
        
        <div class="quick-actions">
            <button class="action-btn" onclick="applyPreset('Day', '09:00', '17:00')">☀️ Day (9-5)</button>
            <button class="action-btn" onclick="applyPreset('Night', '22:00', '06:00')">🌙 Night</button>
            <button class="action-btn" id="cloneBtn" onclick="cloneYesterday()">📋 Copy Yesterday</button>
            <button class="action-btn" onclick="document.getElementById('customName').focus()">✏️ Custom</button>
        </div>

        <div class="custom-form">
            <div class="input-group">
                <label>Shift Label / Task</label>
                <input type="text" id="customName" placeholder="e.g. Training, Custom Shift">
            </div>
            <div class="time-inputs">
                <div class="input-group" style="flex:1">
                    <label>Start</label>
                    <input type="time" id="customStart">
                </div>
                <div class="input-group" style="flex:1">
                    <label>End</label>
                    <input type="time" id="customEnd">
                </div>
            </div>
            <button class="save-btn" onclick="saveShift()">Save Shift</button>
            <button class="clear-btn" onclick="deleteShift()">Delete Shift</button>
        </div>
    </div>
</div>

<script>
let state = JSON.parse(localStorage.getItem('hita_shifts')) || {};
let activeKey = null; // "YYYY-MM-DD-job1"
const DOW = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

function renderSchedule() {
    const startInput = document.getElementById('startDate').value;
    if(!startInput) return;
    
    const start = new Date(startInput + 'T00:00:00');
    const container = document.getElementById('scheduleGrid');
    container.innerHTML = '';
    
    const j1n = document.getElementById('j1Name').value;
    const j2n = document.getElementById('j2Name').value;
    
    let shiftCount = 0;

    for(let i=0; i<31; i++) {
        const d = new Date(start);
        d.setDate(d.getDate() + i);
        const key = d.toISOString().split('T')[0];
        
        const row = document.createElement('div');
        row.className = 'day-card';
        
        const s1 = state[key + '-j1'];
        const s2 = state[key + '-j2'];
        if(s1) shiftCount++;
        if(s2) shiftCount++;

        row.innerHTML = `
            <div class="day-info">
                <div class="dow">${DOW[d.getDay()]}</div>
                <div class="dom">${d.getDate()}</div>
            </div>
            <div class="shift-slot ${s1 ? 'filled j1-bg' : 'empty'}" onclick="openModal('${key}-j1')">
                ${s1 ? `<div class="s-name">${s1.label}</div><div class="s-time">${s1.start}-${s1.end}</div>` : `+ ${j1n}`}
            </div>
            <div class="shift-slot ${s2 ? 'filled j2-bg' : 'empty'}" onclick="openModal('${key}-j2')">
                ${s2 ? `<div class="s-name">${s2.label}</div><div class="s-time">${s2.start}-${s2.end}</div>` : `+ ${j2n}`}
            </div>
        `;
        container.appendChild(row);
    }
    document.getElementById('statCounter').innerText = `${shiftCount} Shifts This Period`;
    localStorage.setItem('hita_shifts', JSON.stringify(state));
}

function openModal(key) {
    activeKey = key;
    const shift = state[key];
    const isJ1 = key.includes('j1');
    const jobName = isJ1 ? document.getElementById('j1Name').value : document.getElementById('j2Name').value;
    
    document.getElementById('modalTitle').innerText = jobName;
    document.getElementById('customName').value = shift ? shift.label : '';
    document.getElementById('customStart').value = shift ? shift.start : '09:00';
    document.getElementById('customEnd').value = shift ? shift.end : '17:00';
    
    document.getElementById('modal').classList.add('active');
}

function applyPreset(label, s, e) {
    document.getElementById('customName').value = label;
    document.getElementById('customStart').value = s;
    document.getElementById('customEnd').value = e;
}

function cloneYesterday() {
    const parts = activeKey.split('-'); // [YYYY, MM, DD, job]
    const currentDay = new Date(parts[0], parts[1]-1, parts[2]);
    currentDay.setDate(currentDay.getDate() - 1);
    const yesterdayKey = currentDay.toISOString().split('T')[0] + '-' + parts[3];
    
    if(state[yesterdayKey]) {
        const prev = state[yesterdayKey];
        applyPreset(prev.label, prev.start, prev.end);
    } else {
        alert("No shift found for yesterday to copy!");
    }
}

function saveShift() {
    state[activeKey] = {
        label: document.getElementById('customName').value || 'Shift',
        start: document.getElementById('customStart').value,
        end: document.getElementById('customEnd').value
    };
    closeModal();
    renderSchedule();
}

function deleteShift() {
    delete state[activeKey];
    closeModal();
    renderSchedule();
}

function closeModal() {
    document.getElementById('modal').classList.remove('active');
}

function exportICS() {
    let ics = ['BEGIN:VCALENDAR', 'VERSION:2.0', 'PRODID:-//Hita//Schedule//EN'];
    for (let key in state) {
        const dateStr = key.split('-').slice(0,3).join('');
        const shift = state[key];
        const sTime = shift.start.replace(':', '') + '00';
        const eTime = shift.end.replace(':', '') + '00';
        
        ics.push('BEGIN:VEVENT');
        ics.push(`DTSTART:${dateStr}T${sTime}`);
        ics.push(`DTEND:${dateStr}T${eTime}`);
        ics.push(`SUMMARY:${shift.label}`);
        ics.push('END:VEVENT');
    }
    ics.push('END:VCALENDAR');
    
    const blob = new Blob([ics.join('\r\n')], {type: 'text/calendar'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'schedule.ics';
    a.click();
}

// Init
const now = new Date();
document.getElementById('startDate').value = now.toISOString().split('T')[0];
renderSchedule();
</script>
</body>
</html>
